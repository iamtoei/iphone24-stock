<!-- =====================================================================
  PATCH — Index.html
  เพิ่ม UI อัพโหลดรูป + JS uploadPhoto ใน modal อนุมัติสัญญา
  ======================================================================

  วิธีใช้:
  1) ใน showReviewDetail() — ค้นหาบรรทัดนี้ใน modal.innerHTML:
       '<div id="ap-status" style="...'
     แล้วแทรก HTML_UPLOAD_SECTION ก่อนบรรทัดนั้น

  2) วาง <script> JS_UPLOAD ไว้ท้าย <script> เดิม (ก่อน </script>)
  ===================================================================== -->


<!-- ============================================================
  PART A — HTML ที่ต้องแทรกใน modal.innerHTML ของ showReviewDetail()
  แทรกก่อนบรรทัด:  '<div id="ap-status" ...'
  ============================================================ -->
<!--
แทน:
  + '<div id="ap-status" style="font-size:13px;color:#8e8e93;margin-bottom:10px;min-height:18px;"></div>'

ด้วย:
  + buildUploadSection()
  + '<div id="ap-status" style="font-size:13px;color:#8e8e93;margin-bottom:10px;min-height:18px;"></div>'
-->


<!-- ============================================================
  PART B — JavaScript (วางท้าย <script> เดิม)
  ============================================================ -->
<script>
// ─────────────────────────────────────────────────────────────────────
//  buildUploadSection()
//  สร้าง HTML ของส่วนอัพโหลดรูปใน modal อนุมัติสัญญา
//  เรียกใน showReviewDetail() แทน string literal
// ─────────────────────────────────────────────────────────────────────
function buildUploadSection() {
  return ''
    + '<div style="margin-bottom:14px;">'
    + '<div style="font-size:11px;font-weight:600;color:#8e8e93;text-transform:uppercase;'
    +   'letter-spacing:.3px;margin-bottom:8px;">📷 รูปสัญญา + รูปเครื่อง</div>'

    // ── drop zone ──────────────────────────────────────────────────
    + '<div id="ap-dropzone" '
    +   'ondragover="apDragOver(event)" ondragleave="apDragLeave(event)" ondrop="apDrop(event)" '
    +   'onclick="document.getElementById(\'ap-file-input\').click()" '
    +   'style="border:2px dashed #e5e5ea;border-radius:12px;padding:18px;text-align:center;'
    +   'cursor:pointer;background:#fafafa;transition:all .15s;margin-bottom:8px;">'
    +   '<div style="font-size:22px;margin-bottom:6px;">📁</div>'
    +   '<div style="font-size:13px;font-weight:500;color:#3a3a3c;">วางรูปที่นี่ หรือคลิกเพื่อเลือกไฟล์</div>'
    +   '<div style="font-size:11px;color:#8e8e93;margin-top:4px;">รองรับ JPG, PNG, PDF · สูงสุด 10MB/ไฟล์</div>'
    + '</div>'

    // ── hidden file input ───────────────────────────────────────────
    + '<input type="file" id="ap-file-input" multiple accept="image/*,.pdf" '
    +   'style="display:none;" onchange="apFilesSelected(this.files)">'

    // ── preview list ────────────────────────────────────────────────
    + '<div id="ap-file-list" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;"></div>'

    // ── upload button ───────────────────────────────────────────────
    + '<div style="margin-top:10px;display:flex;align-items:center;gap:8px;">'
    +   '<button id="ap-upload-btn" class="btn btn-blue btn-sm" '
    +     'onclick="apUploadAll()" style="display:none;">☁️ อัพโหลดรูปทั้งหมด</button>'
    +   '<span id="ap-upload-status" style="font-size:12px;color:#8e8e93;"></span>'
    + '</div>'
    + '</div>';
}

// ─────────────────────────────────────────────────────────────────────
//  State
// ─────────────────────────────────────────────────────────────────────
var _apFiles    = [];   // Array of File objects
var _apUploaded = [];   // Array of { filename, url, previewUrl }

// ─────────────────────────────────────────────────────────────────────
//  Drag & Drop handlers
// ─────────────────────────────────────────────────────────────────────
function apDragOver(e) {
  e.preventDefault();
  var dz = document.getElementById('ap-dropzone');
  if (dz) { dz.style.borderColor = '#007aff'; dz.style.background = '#f0f7ff'; }
}
function apDragLeave(e) {
  var dz = document.getElementById('ap-dropzone');
  if (dz) { dz.style.borderColor = '#e5e5ea'; dz.style.background = '#fafafa'; }
}
function apDrop(e) {
  e.preventDefault();
  apDragLeave(e);
  apFilesSelected(e.dataTransfer.files);
}

// ─────────────────────────────────────────────────────────────────────
//  เมื่อเลือกไฟล์
// ─────────────────────────────────────────────────────────────────────
function apFilesSelected(fileList) {
  if (!fileList || !fileList.length) return;
  for (var i = 0; i < fileList.length; i++) {
    var f = fileList[i];
    if (f.size > 10 * 1024 * 1024) {
      showToast(f.name + ' ใหญ่เกิน 10MB', true); continue;
    }
    _apFiles.push(f);
    apAddPreview(f, _apFiles.length - 1);
  }
  var btn = document.getElementById('ap-upload-btn');
  if (btn && _apFiles.length) btn.style.display = 'inline-flex';
}

// ─────────────────────────────────────────────────────────────────────
//  สร้าง preview thumbnail
// ─────────────────────────────────────────────────────────────────────
function apAddPreview(file, idx) {
  var list = document.getElementById('ap-file-list');
  if (!list) return;
  var item = document.createElement('div');
  item.id = 'ap-prev-' + idx;
  item.style.cssText = 'position:relative;width:80px;height:80px;border-radius:10px;'
    + 'border:1px solid #e5e5ea;overflow:hidden;background:#f5f5f7;'
    + 'display:flex;align-items:center;justify-content:center;flex-shrink:0;';

  if (file.type.startsWith('image/')) {
    var reader = new FileReader();
    reader.onload = (function(el) {
      return function(e) {
        el.innerHTML = '<img src="' + e.target.result + '" style="width:100%;height:100%;object-fit:cover;">'
          + apRemoveBtn(idx) + apStatusBadge(idx);
      };
    })(item);
    reader.readAsDataURL(file);
  } else {
    item.innerHTML = '<div style="font-size:28px;">📄</div>'
      + '<div style="position:absolute;bottom:2px;left:0;right:0;text-align:center;'
      + 'font-size:9px;color:#8e8e93;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;'
      + 'padding:0 4px;">' + htmlEsc(file.name) + '</div>'
      + apRemoveBtn(idx) + apStatusBadge(idx);
  }
  list.appendChild(item);
}

function apRemoveBtn(idx) {
  return '<button onclick="apRemoveFile(' + idx + ')" '
    + 'style="position:absolute;top:3px;right:3px;width:18px;height:18px;border-radius:50%;'
    + 'background:rgba(0,0,0,.5);color:#fff;border:none;cursor:pointer;font-size:10px;'
    + 'display:flex;align-items:center;justify-content:center;padding:0;line-height:1;">✕</button>';
}

function apStatusBadge(idx) {
  return '<div id="ap-badge-' + idx + '" style="display:none;position:absolute;bottom:3px;'
    + 'right:3px;background:#34c759;border-radius:50%;width:16px;height:16px;'
    + 'display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;">✓</div>';
}

function apRemoveFile(idx) {
  _apFiles[idx] = null;
  var el = document.getElementById('ap-prev-' + idx);
  if (el) el.remove();
  var remaining = _apFiles.filter(Boolean).length;
  var btn = document.getElementById('ap-upload-btn');
  if (btn) btn.style.display = remaining ? 'inline-flex' : 'none';
}

// ─────────────────────────────────────────────────────────────────────
//  อัพโหลดทั้งหมด
// ─────────────────────────────────────────────────────────────────────
function apUploadAll() {
  // ดึง MC จาก device ที่เลือกใน modal
  var readyDevices = devices.filter(function(d) { return d.statusKey === 'พร้อมขาย'; });
  var devIdx = window._approveDeviceIdx;
  var mc = (devIdx !== null && devIdx !== undefined && readyDevices[devIdx])
    ? readyDevices[devIdx].code
    : '';

  if (!mc) { showToast('กรุณาเลือกเครื่องก่อนอัพโหลดรูป', true); return; }

  var filesToUpload = _apFiles.filter(Boolean);
  if (!filesToUpload.length) { showToast('ไม่มีไฟล์ที่เลือก', true); return; }

  var statusEl = document.getElementById('ap-upload-status');
  var btn = document.getElementById('ap-upload-btn');
  if (btn) btn.disabled = true;
  if (statusEl) statusEl.textContent = '⏳ กำลังอัพโหลด 0/' + filesToUpload.length + '...';

  var done = 0, failed = 0;
  _apUploaded = [];

  function uploadOne(fileObj, originalIdx) {
    var reader = new FileReader();
    reader.onload = function(e) {
      // แยก base64 ออกจาก data URL
      var dataUrl = e.target.result;
      var base64  = dataUrl.indexOf(',') >= 0 ? dataUrl.split(',')[1] : dataUrl;

      api('uploadPhoto', {
        mc       : mc,
        filename : fileObj.name,
        mimeType : fileObj.type || 'image/jpeg',
        base64   : base64
      }).then(function(res) {
        done++;
        _apUploaded.push(res);
        // ติ๊กถูก thumbnail
        var badge = document.getElementById('ap-badge-' + originalIdx);
        if (badge) badge.style.display = 'flex';
        // อัพเดต status
        if (statusEl) statusEl.textContent = '⏳ ' + done + '/' + filesToUpload.length + ' เสร็จแล้ว...';
        checkDone();
      }).catch(function(err) {
        failed++;
        showToast('อัพโหลด ' + fileObj.name + ' ไม่ได้: ' + err.message, true);
        checkDone();
      });
    };
    reader.readAsDataURL(fileObj);
  }

  function checkDone() {
    if (done + failed < filesToUpload.length) return;
    if (btn) btn.disabled = false;
    if (statusEl) {
      statusEl.innerHTML = done > 0
        ? '✅ อัพโหลดสำเร็จ ' + done + ' ไฟล์'
            + (failed ? ' · <span style="color:#ff3b30;">ล้มเหลว ' + failed + '</span>' : '')
            + ' → <a href="https://drive.google.com/drive/search?q=' + encodeURIComponent(mc)
            + '" target="_blank" style="color:#007aff;">ดูใน Drive</a>'
        : '<span style="color:#ff3b30;">อัพโหลดล้มเหลวทั้งหมด</span>';
    }
    if (done > 0) showToast('อัพโหลดรูป ' + mc + ' สำเร็จ ' + done + ' ไฟล์ ✓');
  }

  // กำหนด originalIdx ให้ถูกต้องจาก _apFiles (ไม่ใช่ filesToUpload)
  var uploadQueue = [];
  _apFiles.forEach(function(f, idx) { if (f) uploadQueue.push({ file: f, idx: idx }); });
  uploadQueue.forEach(function(item) { uploadOne(item.file, item.idx); });
}

// ─────────────────────────────────────────────────────────────────────
//  Reset เมื่อปิด modal
// ─────────────────────────────────────────────────────────────────────
var _origCloseModal = closeModal;
closeModal = function(id) {
  if (id === 'overlay-approve') {
    _apFiles    = [];
    _apUploaded = [];
  }
  _origCloseModal(id);
};

// ─────────────────────────────────────────────────────────────────────
//  Patch showReviewDetail — แทรก buildUploadSection() ใน modal HTML
// ─────────────────────────────────────────────────────────────────────
var _origShowReviewDetail = showReviewDetail;
showReviewDetail = function(idx) {
  _origShowReviewDetail(idx);          // สร้าง modal เดิมก่อน

  // reset state
  _apFiles    = [];
  _apUploaded = [];

  // หาตำแหน่ง ap-status แล้วแทรก upload section ก่อนหน้า
  var statusEl = document.getElementById('ap-status');
  if (!statusEl) return;

  var uploadDiv = document.createElement('div');
  uploadDiv.innerHTML = buildUploadSection();
  statusEl.parentNode.insertBefore(uploadDiv.firstChild, statusEl);
};
</script>
