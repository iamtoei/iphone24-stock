<!-- =====================================================================
  PATCH v2 — Index.html
  วางก้อน <script> นี้ต่อท้าย </script> เดิม (ก่อน </body>)
  แก้ bug: closeModal is not defined
  ===================================================================== -->
<script>
// รอให้ script หลักโหลดเสร็จก่อนทุกอย่าง
window.addEventListener('load', function() {

// ─────────────────────────────────────────────────────────────────────
//  State
// ─────────────────────────────────────────────────────────────────────
var _apFiles    = [];
var _apUploaded = [];

// ─────────────────────────────────────────────────────────────────────
//  buildUploadSection — สร้าง HTML ส่วนอัพโหลด
// ─────────────────────────────────────────────────────────────────────
function buildUploadSection() {
  return '<div id="ap-upload-wrap" style="margin-bottom:14px;">'
    + '<div style="font-size:11px;font-weight:600;color:#8e8e93;text-transform:uppercase;'
    +   'letter-spacing:.3px;margin-bottom:8px;">📷 รูปสัญญา + รูปเครื่อง</div>'
    + '<div id="ap-dropzone" '
    +   'ondragover="apDragOver(event)" ondragleave="apDragLeave(event)" ondrop="apDrop(event)" '
    +   'onclick="document.getElementById(\'ap-file-input\').click()" '
    +   'style="border:2px dashed #e5e5ea;border-radius:12px;padding:18px;text-align:center;'
    +   'cursor:pointer;background:#fafafa;transition:all .15s;margin-bottom:8px;">'
    +   '<div style="font-size:22px;margin-bottom:6px;">📁</div>'
    +   '<div style="font-size:13px;font-weight:500;color:#3a3a3c;">วางรูปที่นี่ หรือคลิกเพื่อเลือกไฟล์</div>'
    +   '<div style="font-size:11px;color:#8e8e93;margin-top:4px;">JPG, PNG, PDF · สูงสุด 10MB/ไฟล์</div>'
    + '</div>'
    + '<input type="file" id="ap-file-input" multiple accept="image/*,.pdf" '
    +   'style="display:none;" onchange="apFilesSelected(this.files)">'
    + '<div id="ap-file-list" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;"></div>'
    + '<div style="margin-top:10px;display:flex;align-items:center;gap:8px;">'
    +   '<button id="ap-upload-btn" class="btn btn-blue btn-sm" '
    +     'onclick="apUploadAll()" style="display:none;">☁️ อัพโหลดรูปทั้งหมด</button>'
    +   '<span id="ap-upload-status" style="font-size:12px;color:#8e8e93;"></span>'
    + '</div>'
    + '</div>';
}

// ─────────────────────────────────────────────────────────────────────
//  Drag & Drop
// ─────────────────────────────────────────────────────────────────────
window.apDragOver = function(e) {
  e.preventDefault();
  var dz = document.getElementById('ap-dropzone');
  if (dz) { dz.style.borderColor = '#007aff'; dz.style.background = '#f0f7ff'; }
};
window.apDragLeave = function(e) {
  var dz = document.getElementById('ap-dropzone');
  if (dz) { dz.style.borderColor = '#e5e5ea'; dz.style.background = '#fafafa'; }
};
window.apDrop = function(e) {
  e.preventDefault();
  window.apDragLeave(e);
  apFilesSelected(e.dataTransfer.files);
};

// ─────────────────────────────────────────────────────────────────────
//  เลือกไฟล์
// ─────────────────────────────────────────────────────────────────────
window.apFilesSelected = function(fileList) {
  if (!fileList || !fileList.length) return;
  for (var i = 0; i < fileList.length; i++) {
    var f = fileList[i];
    if (f.size > 10 * 1024 * 1024) { showToast(f.name + ' ใหญ่เกิน 10MB', true); continue; }
    _apFiles.push(f);
    apAddPreview(f, _apFiles.length - 1);
  }
  var btn = document.getElementById('ap-upload-btn');
  if (btn) btn.style.display = 'inline-flex';
};

function apAddPreview(file, idx) {
  var list = document.getElementById('ap-file-list');
  if (!list) return;
  var item = document.createElement('div');
  item.id = 'ap-prev-' + idx;
  item.style.cssText = 'position:relative;width:80px;height:80px;border-radius:10px;'
    + 'border:1px solid #e5e5ea;overflow:hidden;background:#f5f5f7;'
    + 'display:flex;align-items:center;justify-content:center;flex-shrink:0;';

  var removeBtn = '<button onclick="apRemoveFile(' + idx + ')" '
    + 'style="position:absolute;top:3px;right:3px;width:18px;height:18px;border-radius:50%;'
    + 'background:rgba(0,0,0,.5);color:#fff;border:none;cursor:pointer;font-size:10px;'
    + 'line-height:1;">✕</button>';
  var badge = '<div id="ap-badge-' + idx + '" style="display:none;position:absolute;bottom:3px;'
    + 'right:3px;background:#34c759;border-radius:50%;width:16px;height:16px;'
    + 'align-items:center;justify-content:center;font-size:9px;color:#fff;">✓</div>';

  if (file.type.startsWith('image/')) {
    var reader = new FileReader();
    reader.onload = (function(el, rb, bd) {
      return function(e) {
        el.innerHTML = '<img src="' + e.target.result
          + '" style="width:100%;height:100%;object-fit:cover;">' + rb + bd;
      };
    })(item, removeBtn, badge);
    reader.readAsDataURL(file);
  } else {
    item.innerHTML = '<div style="font-size:28px;">📄</div>' + removeBtn + badge;
  }
  list.appendChild(item);
}

window.apRemoveFile = function(idx) {
  _apFiles[idx] = null;
  var el = document.getElementById('ap-prev-' + idx);
  if (el) el.remove();
  var remaining = _apFiles.filter(Boolean).length;
  var btn = document.getElementById('ap-upload-btn');
  if (btn) btn.style.display = remaining ? 'inline-flex' : 'none';
};

// ─────────────────────────────────────────────────────────────────────
//  อัพโหลดทั้งหมด
// ─────────────────────────────────────────────────────────────────────
window.apUploadAll = function() {
  var readyDevices = devices.filter(function(d) { return d.statusKey === 'พร้อมขาย'; });
  var devIdx = window._approveDeviceIdx;
  var mc = (devIdx !== null && devIdx !== undefined && readyDevices[devIdx])
    ? readyDevices[devIdx].code : '';

  if (!mc) { showToast('กรุณาเลือกเครื่องก่อนอัพโหลดรูป', true); return; }

  var filesToUpload = _apFiles.filter(Boolean);
  if (!filesToUpload.length) { showToast('ไม่มีไฟล์ที่เลือก', true); return; }

  var statusEl = document.getElementById('ap-upload-status');
  var btn = document.getElementById('ap-upload-btn');
  if (btn) btn.disabled = true;
  if (statusEl) statusEl.textContent = '⏳ กำลังอัพโหลด 0/' + filesToUpload.length + '...';

  var done = 0, failed = 0;
  _apUploaded = [];

  var uploadQueue = [];
  _apFiles.forEach(function(f, idx) { if (f) uploadQueue.push({ file: f, idx: idx }); });

  uploadQueue.forEach(function(item) {
    var reader = new FileReader();
    reader.onload = function(e) {
      var dataUrl = e.target.result;
      var base64  = dataUrl.indexOf(',') >= 0 ? dataUrl.split(',')[1] : dataUrl;
      api('uploadPhoto', {
        mc: mc, filename: item.file.name,
        mimeType: item.file.type || 'image/jpeg', base64: base64
      }).then(function(res) {
        done++;
        _apUploaded.push(res);
        var badge = document.getElementById('ap-badge-' + item.idx);
        if (badge) { badge.style.display = 'flex'; }
        if (statusEl) statusEl.textContent = '⏳ ' + done + '/' + uploadQueue.length + ' เสร็จแล้ว...';
        checkDone();
      }).catch(function(err) {
        failed++;
        showToast('อัพโหลด ' + item.file.name + ' ไม่ได้: ' + err.message, true);
        checkDone();
      });
    };
    reader.readAsDataURL(item.file);
  });

  function checkDone() {
    if (done + failed < uploadQueue.length) return;
    if (btn) btn.disabled = false;
    if (statusEl) {
      statusEl.innerHTML = done > 0
        ? '✅ อัพโหลดสำเร็จ ' + done + ' ไฟล์'
          + (failed ? ' · <span style="color:#ff3b30;">ล้มเหลว ' + failed + '</span>' : '')
          + ' · <a href="https://drive.google.com/drive/search?q=' + encodeURIComponent(mc)
          + '" target="_blank" style="color:#007aff;">ดูใน Drive</a>'
        : '<span style="color:#ff3b30;">อัพโหลดล้มเหลวทั้งหมด</span>';
    }
    if (done > 0) showToast('อัพโหลดรูป ' + mc + ' สำเร็จ ' + done + ' ไฟล์ ✓');
  }
};

// ─────────────────────────────────────────────────────────────────────
//  Patch showReviewDetail — แทรก upload section ใน modal
//  ทำหลัง window.load เพื่อให้ showReviewDetail ถูก declare แล้ว
// ─────────────────────────────────────────────────────────────────────
var _origShowReviewDetail = showReviewDetail;
showReviewDetail = function(idx) {
  // reset state ทุกครั้งที่เปิด modal ใหม่
  _apFiles    = [];
  _apUploaded = [];

  _origShowReviewDetail(idx);

  // แทรก upload section ก่อน #ap-status
  var statusEl = document.getElementById('ap-status');
  if (!statusEl) return;
  var wrap = document.createElement('div');
  wrap.innerHTML = buildUploadSection();
  statusEl.parentNode.insertBefore(wrap.firstChild, statusEl);
};

// ─────────────────────────────────────────────────────────────────────
//  Patch closeModal — reset state เมื่อปิด modal
// ─────────────────────────────────────────────────────────────────────
var _origCloseModal = closeModal;
closeModal = function(id) {
  if (id === 'overlay-approve') {
    _apFiles    = [];
    _apUploaded = [];
  }
  _origCloseModal(id);
};

}); // end window.addEventListener('load')
</script>
